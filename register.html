<!DOCTYPE html>
<html>
<head>
    <title>Register - Fix Mzuzu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f4f7f8;
            color: #333;
        }

        header {
            background-color: #0a3d62;
            color: white;
            text-align: center;
            padding: 20px;
        }

        header a {
            color: white;
            text-decoration: none;
            display: block;
            margin-top: 5px;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Modern Form Styling */
        form {
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        form h2 {
            margin-top: 0;
            margin-bottom: 25px;
            color: #0a3d62;
            text-align: center;
        }

        input, textarea, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #1e90ff;
            outline: none;
            box-shadow: 0 0 5px rgba(30,144,255,0.3);
        }

        button {
            background-color: #0a3d62;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #1e90ff;
        }

        @media(max-width:600px){
            form {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

<header>
    <h2>Register as a Service Provider</h2>
    <a href="index.html">← Back Home</a>
</header>

<div class="container">

    <form id="registerForm">
        <h2>Provider Registration</h2>
        <input type="text" id="name" placeholder="Full Name or Business Name" required>
        <input type="text" id="phone" placeholder="Phone Number" required>
        <input type="text" id="service" placeholder="type of service provider (e.g. Plumber)" required>
        <input type="text" id="location" placeholder="Location in Mzuzu" required>
        <textarea id="message" rows="5" placeholder="what services you offer in your service providing profession" required></textarea>
        <button type="submit">Send via WhatsApp</button>
    </form>

</div>

<script>
    const form = document.getElementById('registerForm');

    form.addEventListener('submit', function(e){
        e.preventDefault();

        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const service = document.getElementById('service').value;
        const location = document.getElementById('location').value;
        const message = document.getElementById('message').value;

        let text = `Hello! I am registering as a service provider.\nName/Business: ${name}\nPhone: ${phone}\nService: ${service}\nLocation: ${location}\nDetails: ${message}`;
        text = encodeURIComponent(text);

        // Replace with your WhatsApp number (Malawi format: 265XXXXXXXX)
        const waNumber = "265993661065";

        window.open(`https://wa.me/${waNumber}?text=${text}`, '_blank');
    });
</script>

</body>
</html>
