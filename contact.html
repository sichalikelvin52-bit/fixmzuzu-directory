<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact / Register | Fix Mzuzu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif;}
    body {background:#f4f6f9; color:#333;}
    
    header {
      background:#0a192f;
      color:white;
      padding:20px;
      text-align:center;
    }
    header h1 {font-size:28px; margin-bottom:5px;}
    header p {color:#b0c4de;}
    nav {margin-top:10px;}
    nav a {color:white; text-decoration:none; margin:0 15px; font-weight:bold; transition:0.3s;}
    nav a:hover {color:#00bfff;}

    .section {max-width:700px; margin:50px auto; padding:0 20px;}
    .section h2 {text-align:center; margin-bottom:30px; color:#0a192f;}
    
    form {
      background:white;
      padding:30px;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
    }
    label {display:block; margin-bottom:8px; font-weight:bold;}
    input, select, textarea {
      width:100%;
      padding:10px;
      margin-bottom:20px;
      border-radius:6px;
      border:1px solid #ccc;
      font-size:14px;
    }
    textarea {resize:none; height:120px;}
    .btn {
      display:inline-block;
      padding:12px 20px;
      background:#0077ff;
      color:white;
      border:none;
      border-radius:6px;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
      text-decoration:none;
      text-align:center;
    }
    .btn:hover {background:#005ad1;}
    
    footer {
      text-align:center;
      padding:20px;
      background:#0a192f;
      color:white;
      margin-top:40px;
      font-size:14px;
    }
  </style>
</head>
<body>

<header>
  <h1>Contact / Register Your Business</h1>
  <p>Reach us directly or register to promote your business</p>
  <nav>
    <a href="index.html">Home</a>
  </nav>
</header>

<section class="section">
  <h2>Business Registration / Customer Inquiry Form</h2>
  
  <form id="contactForm">
    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="Your Name" required>

    <label for="business">Business Name / Service</label>
    <input type="text" id="business" placeholder="Business or Service Name">

    <label for="phone">WhatsApp Number</label>
    <input type="text" id="phone" placeholder="e.g. 099XXXXXXX" required>

    <label for="package">Promotion / Inquiry Type</label>
    <select id="package" required>
      <option value="">Select Package / Inquiry</option>
      <option value="Featured Listing">Featured Listing</option>
      <option value="Social Media Management">Social Media Management</option>
      <option value="WhatsApp Setup">WhatsApp Business Setup</option>
      <option value="Website Design">Website Design</option>
      <option value="Customer Inquiry">Customer Service Inquiry</option>
    </select>

    <label for="message">Additional Details</label>
    <textarea id="message" placeholder="Any additional information..."></textarea>

    <!-- Submit button triggers WhatsApp -->
    <a href="#" class="btn" id="submitBtn">Send via WhatsApp</a>
  </form>
</section>

<footer>
  © 2026 Fix Mzuzu | Promoting Local Businesses & Connecting Customers
</footer>

<script>
  // WhatsApp link
  const submitBtn = document.getElementById("submitBtn");
  submitBtn.addEventListener("click", function(e){
    e.preventDefault();
    
    const name = document.getElementById("name").value;
    const business = document.getElementById("business").value;
    const phone = document.getElementById("phone").value;
    const packageType = document.getElementById("package").value;
    const message = document.getElementById("message").value;
    
    if(!name || !phone || !packageType){
      alert("Please fill all required fields.");
      return;
    }
    
    // WhatsApp message
    let text = `Hello Fix Mzuzu,%0AName: ${name}%0ABusiness: ${business}%0AWhatsApp: ${phone}%0APackage/Inquiry: ${packageType}%0AMessage: ${message}`;
    
    // Your WhatsApp number (replace with yours)
    let whatsappNumber = "265993661065"; 
    
    // Open WhatsApp
    window.open(`https://wa.me/${whatsappNumber}?text=${text}`, "_blank");
  });
</script>

</body>
</html>
